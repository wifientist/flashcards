name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: flashcards
          POSTGRES_PASSWORD: flashcards
          POSTGRES_DB: flashcards
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U flashcards"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: api

    env:
      DATABASE_URL: postgresql+psycopg2://flashcards:flashcards@localhost:5432/flashcards
      REDIS_URL_0: redis://localhost:6379/15
      JWT_SECRET_KEY: ci-test-secret-not-a-placeholder-0123456789
      ENVIRONMENT: development

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: api/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: pytest

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test
